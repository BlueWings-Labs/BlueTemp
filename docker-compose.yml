# Phase 2+ infrastructure (optional — not required for Phase 1)
# Start: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bluewings
      POSTGRES_PASSWORD: bluewings
      POSTGRES_DB: bluewings
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
